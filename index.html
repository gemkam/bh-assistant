<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beaconhouse AI Assistant</title>
    <style>
        /* Exact Blue from your image */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: #002147; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; text-align: center; 
        }
        
        .portal-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 50px 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            width: 85%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .logo-container { margin-bottom: 30px; }
        .logo-container img { height: 110px; }

        .accent-line {
            width: 60px;
            height: 4px;
            background-color: #FFD700; /* School Gold */
            margin: 20px auto;
            border-radius: 2px;
        }

        h1 { font-size: 24px; letter-spacing: 2px; margin: 0; font-weight: 300; text-transform: uppercase; }
        p { font-size: 15px; color: #cbd5e0; margin-bottom: 40px; line-height: 1.6; }

        .start-btn {
            display: inline-block;
            background-color: #FFD700;
            color: #002147;
            padding: 20px 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.2);
            transition: all 0.3s ease;
        }

        .start-btn:active { transform: scale(0.96); background-color: #ffffff; }

        .brand-footer { margin-top: 40px; font-size: 11px; color: #4a5568; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="portal-card">
        <div class="logo-container">
            <!-- Verify file is named bss-logo.png in GitHub -->
            <img src="bss-logo.png" alt="Beaconhouse Logo">
        </div>
        
        <h1>BEACONHOUSE AI Assistant</h1>
        <div class="accent-line"></div>
        <p>Welcome to the official Beaconhouse Voice Portal. Tap below to speak with our AI Assistant.</p>

        <!-- REPLACE 'YOUR_VAPI_LINK' with your Public Demo URL -->
        <a href="https://bit.ly/4t6DOEU" class="start-btn">START CONVERSATION</a>
    </div>

    <div class="brand-footer">POWERED BY KS TECH AI</div>

</body>
</html>
